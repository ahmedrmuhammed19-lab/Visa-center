<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branch Directory | Global EIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#153B6B;
    --ink-2:#0F2C50;
    --paper:#F6F7F9;
    --paper-2:#ECEEF2;
    --line:#DCE1E8;
    --slate:#232A36;
    --muted:#6B7280;
    --gold:#C9962C;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--slate);
    font-family:'Libre Franklin', sans-serif;
    min-height:100vh;
  }

  /* ---------- Header ---------- */
  header{
    background:var(--ink-2);
    color:#fff;
    padding:22px 32px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; inset:0;
    background-image:radial-gradient(circle at 95% -30%, rgba(201,150,44,0.28), transparent 55%);
    pointer-events:none;
  }
  .brand{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    position:relative;
    z-index:1;
    max-width:900px;
    margin:0 auto;
  }
  .brand-mark{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .brand-mark img{
    height:34px;
    width:auto;
    display:block;
  }
  .logo-badge{
    background:#fff;
    border-radius:6px;
    padding:6px 10px;
    display:flex;
    align-items:center;
    line-height:0;
  }
  .brand-text{ border-inline-start:1px solid rgba(255,255,255,.25); padding-inline-start:16px; }
  .brand-text h1{
    margin:0;
    font-size:18px;
    font-weight:700;
    letter-spacing:.2px;
  }
  .brand-text p{
    margin:2px 0 0;
    font-size:12px;
    color:#AEC0DA;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.4px;
  }
  .stat-line{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:#AEC0DA;
  }
  .stat-line b{ color:var(--gold); font-weight:500; }
  .brand-right{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-mark-right{
    height:28px;
    width:auto;
    display:block;
  }
  @media (max-width:560px){
    .brand-mark-right{ display:none; }
  }

  main{
    max-width:900px;
    margin:0 auto;
    padding:44px 24px 60px;
  }

  .intro{
    text-align:center;
    margin-bottom:34px;
  }
  .intro h2{
    font-size:22px;
    margin:0 0 6px;
    color:var(--ink-2);
  }
  .intro p{
    color:var(--muted);
    font-size:14px;
    margin:0;
  }

  /* ---------- Step selectors ---------- */
  .steps{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    max-width:620px;
    margin:0 auto;
  }
  @media (max-width:560px){
    .steps{ grid-template-columns:1fr; }
  }
  .step{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    transition:opacity .2s, border-color .2s;
  }
  .step.disabled{
    opacity:.45;
    pointer-events:none;
  }
  .step label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:11.5px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:10px;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.4px;
    text-transform:uppercase;
  }
  .step label .num{
    width:18px;height:18px;
    border-radius:50%;
    background:var(--ink-2);
    color:#fff;
    font-size:10.5px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  select, .text-input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--slate);
    font-family:'Libre Franklin',sans-serif;
    font-size:15px;
    outline:none;
    transition:border-color .15s;
    cursor:pointer;
  }
  .text-input{ cursor:text; }
  select:focus, .text-input:focus{ border-color:var(--ink); }
  select:disabled{ background:var(--paper-2); cursor:not-allowed; }

  .autocomplete-wrap{ position:relative; }
  .suggestions{
    display:none;
    position:absolute;
    top:calc(100% + 6px);
    left:0; right:0;
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:8px;
    max-height:220px;
    overflow-y:auto;
    z-index:20;
    box-shadow:0 10px 24px rgba(15,44,80,.14);
  }
  .suggestions.open{ display:block; }
  .suggestion-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    cursor:pointer;
    font-size:14.5px;
    color:var(--slate);
  }
  .suggestion-item:hover, .suggestion-item.active{ background:var(--paper-2); }
  .suggestion-code{
    flex-shrink:0;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink);
    background:var(--paper-2);
    padding:2px 7px;
    border-radius:4px;
    text-transform:uppercase;
  }
  .suggestion-empty{
    padding:12px 14px;
    font-size:13px;
    color:var(--muted);
    text-align:center;
  }

  /* ---------- Result ---------- */
  .result-wrap{
    max-width:620px;
    margin:30px auto 0;
    min-height:20px;
  }
  .placeholder-hint{
    text-align:center;
    color:var(--muted);
    font-size:13.5px;
    padding:26px 20px;
    border:1.5px dashed var(--line);
    border-radius:10px;
  }
  .card{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:22px 24px;
    position:relative;
    display:grid;
    gap:11px;
    animation:fadeIn .25s ease;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0;
    width:0; height:0;
    border-style:solid;
    border-width:0 0 26px 26px;
    border-color:transparent transparent var(--paper-2) transparent;
  }
  .card h3{
    margin:0;
    font-size:18px;
    color:var(--ink-2);
  }
  .card .row{
    display:flex;
    gap:10px;
    align-items:flex-start;
    font-size:14px;
    color:#3a4055;
  }
  .card .row .tag{
    flex-shrink:0;
    width:70px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink);
    background:var(--paper-2);
    padding:3px 8px;
    border-radius:4px;
    text-transform:uppercase;
    text-align:center;
  }
  .card .phone{
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.3px;
  }
  .copy-btn{
    all:unset;
    cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:2px 8px;
    border-radius:4px;
    margin-inline-start:8px;
  }
  .copy-btn:hover{ background:var(--gold); color:#fff; }

  .client-card{
    margin-top:16px;
    border-color:var(--ink);
  }
  .client-card h3{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .client-card h3::before{
    content:"";
    width:8px; height:8px;
    border-radius:50%;
    background:var(--gold);
    display:inline-block;
  }
  .copy-all-btn{
    all:unset;
    cursor:pointer;
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    font-weight:500;
    letter-spacing:.3px;
    color:#fff;
    background:var(--ink-2);
    padding:11px 14px;
    border-radius:6px;
    margin-top:4px;
    transition:background .15s;
  }
  .copy-all-btn:hover{ background:var(--ink); }

  footer{
    text-align:center;
    padding:18px;
    font-size:11px;
    color:#9aa0ab;
    font-family:'IBM Plex Mono',monospace;
  }
</style>
</head>

const countryInput       = document.getElementById('countryInput');

const branchSelect  = document.getElementById('branchSelect');

const resultWrap    = document.getElementById('resultWrap');
let selectedCountry = null;

function escAttr(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function copyToClipboard(text, btn){
  function showCopied(){
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = original; }, 1200);
  }
  function fallbackCopy(){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try{
      document.execCommand('copy');
      showCopied();
    }catch(err){
      alert('تعذر النسخ تلقائيًا، برجاء النسخ يدويًا:\n' + text);
    }
    document.body.removeChild(ta);
  }
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
}

resultWrap.addEventListener('click', function(e){
  const btn = e.target.closest('.copy-btn');
  if(!btn) return;
  copyToClipboard(btn.getAttribute('data-copy'), btn);
});

function init(){
  document.getElementById('countryCount').textContent = DATA.length;
  document.getElementById('branchCount').textContent = DATA.reduce((n,c)=>n+c.branches.length,0);
}

function filterCountries(query){
  const q = query.trim().toLowerCase();
  if(!q) return DATA;
  return DATA.filter(c => c.country.toLowerCase().includes(q));
}

function renderSuggestions(list){
  if(list.length === 0){
    countrySuggestions.innerHTML = '<div class="suggestion-empty">No matching country</div>';
  } else {
    countrySuggestions.innerHTML = list.map(c =>
      `<div class="suggestion-item" data-country="${escAttr(c.country)}">
         <span>${c.country}</span>
       </div>`
    ).join('');
  }
  countrySuggestions.classList.add('open');
}

function hideSuggestions(){
  countrySuggestions.classList.remove('open');
}

function populateBranches(countryName){
  resultWrap.innerHTML = `<div class="placeholder-hint">Branch details will appear here once selected.</div>`;

  if(!countryName){
    branchStep.classList.add('disabled');
    branchSelect.disabled = true;
    branchSelect.innerHTML = '<option value="">Select branch...</option>';
    return;
  }

  const country = DATA.find(c => c.country === countryName);
  branchSelect.innerHTML = '<option value="">Select branch...</option>' +
    country.branches.map((b,i) => `<option value="${i}">${b.name}</option>`).join('');
  branchStep.classList.remove('disabled');
  branchSelect.disabled = false;
}

function selectCountry(name){
  const country = DATA.find(c => c.country === name);
  if(!country) return;
  selectedCountry = name;
  countryInput.value = name;
  hideSuggestions();
  populateBranches(name);
}

countryInput.addEventListener('input', function(){
  selectedCountry = null;
  populateBranches(null);
  renderSuggestions(filterCountries(countryInput.value));
});

countryInput.addEventListener('focus', function(){
  renderSuggestions(filterCountries(countryInput.value));
});

countryInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    const matches = filterCountries(countryInput.value);
    if(matches.length > 0) selectCountry(matches[0].country);
    e.preventDefault();
  } else if(e.key === 'Escape'){
    hideSuggestions();
  }
});

countrySuggestions.addEventListener('mousedown', function(e){
  const item = e.target.closest('.suggestion-item');
  if(!item) return;
  e.preventDefault();
  selectCountry(item.getAttribute('data-country'));
});

document.addEventListener('click', function(e){
  if(!e.target.closest('.autocomplete-wrap')) hideSuggestions();
});

function onBranchChange(){
  const countryName = selectedCountry;
  const idx = branchSelect.value;
  if(!countryName || idx === ""){
    resultWrap.innerHTML = `<div class="placeholder-hint">Branch details will appear here once selected.</div>`;
    return;
  }
  const country = DATA.find(c => c.country === countryName);
  const b = country.branches[idx];

  resultWrap.innerHTML = `
    <div class="card">
      <h3>${b.name}</h3>
      <div class="row"><span class="tag">Country</span><span>${countryName}</span></div>
      <div class="row"><span class="tag">City</span><span>${b.city}</span></div>
      <div class="row"><span class="tag">Visa Center</span><span>${b.visaCenter}</span></div>
      <div class="row"><span class="tag">Address</span><span>${b.address}</span></div>
      <div class="row"><span class="tag">Map Location</span><span><a href="${b.mapLink}" target="_blank" rel="noopener">${b.mapLink}</a></span></div>
      <div class="row"><span class="tag">Working Hours</span><span>${b.workingHours || '—'}</span></div>
      <div class="row"><span class="tag">Phone</span><span class="phone">${b.phone}</span>
        <button class="copy-btn" data-copy="${escAttr(b.phone)}">Copy</button>
      </div>
      <div class="row"><span class="tag">Reference</span><span><a href="${b.reference}" target="_blank" rel="noopener">${b.reference}</a></span>
        <button class="copy-btn" data-copy="${escAttr(b.reference)}">Copy</button>
      </div>
    </div>

    <div class="card client-card">
      <h3>Send to Client</h3>
      <div class="row"><span class="tag">Address</span><span>${b.address}</span></div>
      <div class="row"><span class="tag">Map Location</span><span><a href="${b.mapLink}" target="_blank" rel="noopener">${b.mapLink}</a></span></div>
      <div class="row"><span class="tag">Working Hours</span><span>${b.workingHours || '—'}</span></div>
      <button class="copy-btn copy-all-btn" data-copy="${escAttr('Address: ' + b.address + '\n\nGoogle Maps: ' + b.mapLink + '\n\nWorking Hours: ' + (b.workingHours || ''))}">Copy Address + Location</button>
    </div>
  `;
}

branchSelect.addEventListener('change', onBranchChange);

init();
</script>

</body>
</html>
